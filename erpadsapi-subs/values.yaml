# Default values for erpadsapi-subs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1
revisionHistoryLimit: 3

image:
  repository: docker.corp.chartercom.com/erp/subs_api
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: [{ name: "regsecret" }]
nameOverride: "erpadsapi-subs"
fullnameOverride: ""
livelinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 120
readinessProbe:
  initialDelaySeconds: 30
  failureThreshold: 5

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

secrets:
  - name: SVCADS
    valueFrom:
      secretKeyRef:
        name: svc-ads
        key: password
  - name: JASYPTSUBS
    valueFrom:
      secretKeyRef:
        name: jasypt-subs
        key: password
  - name: SVCCLM
    valueFrom:
      secretKeyRef:
        name: svc-clm
        key: password
  - name: MSOREPORTSCHARTER
    valueFrom:
      secretKeyRef:
        name: prd-msoreportscharter-rw
        key: password
  - name: KEYPASSWORD
    valueFrom:
      secretKeyRef:
        name: ads-keystore
        key: password
  - name: SVCIADSSFTPNESTOR
    valueFrom:
      secretKeyRef:
        name: svci-ads-sftp-nestor
        key: password
  - name: SVCSUBSNESTOR
    valueFrom:
      secretKeyRef:
        name: svc-subs-nestor
        key: password
  - name: SVCADSADMIN
    valueFrom:
      secretKeyRef:
        name: svc-ads-admin
        key: password

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
    add:
    - NET_BIND_SERVICE
  runAsNonRoot: true
  runAsUser: USERID
  runAsGroup: GROUPID
  allowPrivilegeEscalation: false
  seccompProfile:
    type: RuntimeDefault


service:
  type: ClusterIP
  port: 443

ingress:
  enabled: true
  className: istio
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: "erpadsapi-subs.erpadsapi.svc.cluster.local"
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: erpadsapi-subs
              port:
                number: 443
  tls:
    - secretName: erpadsapi-tls-secret
      hosts:
        - https-adssubs<ENVIRON>.corp.chartercom.com

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 4000m
    memory: 4Gi
  requests:
    cpu: 300m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: {}
  behavior:
    scaleUp:
     stabilizationWindowSeconds: 0
     policies:
     - type: Pods
       value: 1
       periodSeconds: 90
    scaleDown:
     stabilizationWindowSeconds: 300
     policies:
     - type: Pods
       value: 1
       periodSeconds: 120

# Additional volumes on the output Deployment definition.
volumes:
- name: nestor-extract-MNTENV
  persistentVolumeClaim:
    claimName: nestor-extract-MNTENV
- name: ads-transfer
  persistentVolumeClaim:
    claimName: nfs13-ads-transfer-pvc
- name: nfs13-sap-pvc
  persistentVolumeClaim:
    claimName: nfs13-sap-pvc
- name: nfs13-revshare-MNTENV-pvc
  persistentVolumeClaim:
    claimName: nfs13-revshare-MNTENV-pvc
- name: nfs13-mobilerev-MNTENV-pvc
  persistentVolumeClaim:
    claimName: nfs13-mobilerev-MNTENV-pvc
- name: nfs13-ads-MNTENV-pvc
  persistentVolumeClaim:
    claimName: nfs13-ads-MNTENV-pvc
- name: drm-pvc
  persistentVolumeClaim:
    claimName: drm-pvc
- name: smb-adjmap-pvc
  persistentVolumeClaim:
    claimName: smb-adjmap-pvc
- name: smb-saperpMNTENV-ads-pvc
  persistentVolumeClaim:
    claimName: smb-saperpMNTENV-ads-pvc
- name: smb-saperpMNTENV-mobrev-pvc
  persistentVolumeClaim:
    claimName: smb-saperpMNTENV-mobrev-pvc
- name: smb-saperpMNTENV-revshare-pvc
  persistentVolumeClaim:
    claimName: smb-saperpMNTENV-revshare-pvc
- name: smb-eip-pvc
  persistentVolumeClaim:
    claimName: smb-eip-pvc
- name: nfs13-triple-check-MNTENV-pvc
  persistentVolumeClaim:
    claimName: nfs13-triple-check-MNTENV-pvc
- name: smb-saperpMNTENV-rsn-pvc
  persistentVolumeClaim:
    claimName: smb-saperpMNTENV-rsn-pvc
- name: app-properties
  configMap:
    name: subs-app-prop-<PROP>

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
- mountPath: /ads_transfer/samba/Nestor
  name: nestor-extract-MNTENV
- mountPath: /ads_transfer
  name: ads-transfer
- mountPath: /sap #goes to the SMB
  name: smb-saperpMNTENV-ads-pvc
- mountPath: /ads_transfer/revshare/sap_old #goes to the nfs
  name: nfs13-revshare-MNTENV-pvc
- mountPath: /ads_transfer/mobile/sap_old #goes to the nfs
  name: nfs13-mobilerev-MNTENV-pvc
- mountPath: /ads_transfer/samba/SAP_Old #goes to the nfs
  name: nfs13-ads-MNTENV-pvc
- mountPath: /ads_transfer/samba/DRM
  name: drm-pvc
- mountPath: /ads_transfer/samba/ADJMAP
  name: smb-adjmap-pvc
- mountPath: /ads_transfer/samba/SAP
  name: smb-saperpMNTENV-ads-pvc
- mountPath: /ads_transfer/mobile/sap
  name: smb-saperpMNTENV-mobrev-pvc
- mountPath: /ads_transfer/revshare/sap
  name: smb-saperpMNTENV-revshare-pvc
- mountPath: /ads_transfer/samba/EIP
  name: smb-eip-pvc
- mountPath: /ads_transfer/samba/KPMG
  name: smb-saperpMNTENV-ads-pvc
- mountPath: /triple_check_MNTENV
  name: nfs13-triple-check-MNTENV-pvc
- mountPath: /ads_transfer/rsn_MNTENV/sap
  name: smb-saperpMNTENV-rsn-pvc
- mountPath: /stage/application.properties
  name: app-properties
  subPath: application.properties

nodeSelector: {}

tolerations: []

affinity: {}
 